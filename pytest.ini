[pytest]
pythonpath = .
testpaths = tests/
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov=shared
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    -p no:randomly
filterwarnings =
    ignore::DeprecationWarning:importlib.metadata
    ignore::UserWarning:qdrant_client.qdrant_remote
markers =
    unit: Unit tests
    integration: Integration tests
    regression: Regression tests
    performance: Performance and load tests
    slow: Slow running tests
    db: Tests that require database
    qdrant: Tests that require Qdrant
