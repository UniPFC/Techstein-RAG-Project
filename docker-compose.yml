

services:
  # 1. Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: src/web/Dockerfile
    container_name: rag_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api/v1
      - NODE_ENV=production
    volumes:
      - ./src/web/app:/app/app
      - ./src/web/components:/app/components
      - ./src/web/lib:/app/lib
      - ./src/web/styles:/app/styles
      - ./src/web/public:/app/public
    networks:
      - rag_network
    depends_on:
      - api

  # 2. API Backend (FastAPI)
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: rag_api
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./data:/app/data
      - ./cache:/app/cache
      - ./alembic:/app/alembic
      - ./shared:/app/shared
      - ./config:/app/config
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    networks:
      - rag_network
    depends_on:
      - db
      - vector_db

  # 3. Banco Relacional (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: rag_postgres
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_network

  # 4. Banco Vetorial (Qdrant)
  vector_db:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333" # Porta da API REST
      - "6334:6334" # Porta gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag_network

volumes:
  postgres_data:
  qdrant_storage:

networks:
  rag_network:
    driver: bridge
